repos:
  - repo: local
    hooks:
      - id: ruff-backend
        name: ruff (backend)
        entry: bash -c 'cd backend && ruff check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: oxlint-frontend
        name: oxlint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(js|jsx)$
        pass_filenames: false
